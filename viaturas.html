<script>
// Map car IDs for detail page links
var ID_MAP={'Lamborghini':'lamborghini','Ferrari':'ferrari','Mercedes-Benz G 63':'mercedes-g63','Audi R8':'audi-r8','Mercedes-Benz AMG GT':'mercedes-amg-gt','Mercedes-Benz GLE 63':'mercedes-gle-63'};
function getLink(car){
  for(var k in ID_MAP){if((car.b+' '+car.m).includes(k))return 'viatura.html?id='+ID_MAP[k];}
  return 'viaturas.html';
}

var CARS=[
{b:'Lamborghini',m:'Aventador LP700-4',p:349900,y:2012,km:17929,f:'Gasolina',img:'img/cars/omeustandcarros153408-1_c2eff74a921c.webp'},
{b:'Ferrari',m:'488 GTB',p:269990,y:2018,km:34724,f:'Gasolina',img:'img/cars/omeustandcarros135963-1_3063937cdf10.webp'},
{b:'Mercedes-Benz',m:'G 63 AMG',p:220000,y:2021,km:20820,f:'Gasolina',img:'img/cars/omeustandcarros130027-1_44565ae75b8c.webp'},
{b:'Audi',m:'R8 Spyder 5.2 V10',p:119990,y:2012,km:88858,f:'Gasolina',img:'img/cars/omeustandcarros161314-1_c2f0dde86ee9.webp'},
{b:'Mercedes-Benz',m:'AMG GT S',p:114990,y:2017,km:18740,f:'Gasolina',img:'img/cars/omeustandcarros155729-1_fb2c6296cda3.webp'},
{b:'Mercedes-Benz',m:'GLE 63 AMG S Coupé',p:99990,y:2015,km:149475,f:'Gasolina',img:'img/cars/omeustandcarros160253-1_1623a07bb6eb.webp'},
{b:'Porsche',m:'Taycan Standard',p:82000,y:2024,km:38405,f:'Eléctrico',img:'img/cars/omeustandcarros154650-1_90a3d24500c8.webp'},
{b:'Bentley',m:'Continental GT V8',p:89990,y:2013,km:81000,f:'Gasolina',img:'img/cars/omeustandcarros147490-1_2d57006dbc6c.webp'},
{b:'Mercedes-Benz',m:'C 63 AMG S',p:77990,y:2016,km:60883,f:'Gasolina',img:'img/cars/omeustandcarros157208-1_4a44c5026f44.webp'},
{b:'BMW',m:'M4 Coupe',p:62990,y:2017,km:58621,f:'Gasolina',img:'img/cars/omeustandcarros145310-1_ce074fb7bf63.webp'},
{b:'Audi',m:'Q8 50 TDI quattro',p:63990,y:2019,km:133725,f:'Gasóleo',img:'img/cars/omeustandcarros159789-1_937c581904b1.webp'},
{b:'Audi',m:'e-tron GT quattro',p:57990,y:2022,km:59200,f:'Eléctrico',img:'img/cars/omeustandcarros158125-1_e722c9946b3d.webp'},
{b:'BMW',m:'840d xDrive Pack M',p:57990,y:2019,km:165089,f:'Gasóleo',img:'img/cars/omeustandcarros158621-1_0992c579b34c.webp'},
{b:'Porsche',m:'Panamera S e-Hybrid',p:45990,y:2014,km:157000,f:'Híbrido',img:'img/cars/omeustandcarros150379-1_be377c80b821.webp'},
{b:'Maserati',m:'Quattroporte 4.2 V8',p:34990,y:2005,km:133521,f:'Gasolina',img:'img/cars/omeustandcarros144572-1_4843870c5794.webp'},
{b:'BMW',m:'428 i M Sport',p:33990,y:2014,km:110590,f:'Gasolina',img:'img/cars/omeustandcarros159739-1_fc9e6e8ef451.webp'},
{b:'BMW',m:'520 d Pack M',p:23990,y:2017,km:262000,f:'Gasóleo',img:'img/cars/omeustandcarros161084-1_5758c1391478.webp'},
{b:'Mazda',m:'CX-9',p:21990,y:2017,km:145918,f:'Gasolina',img:'img/cars/5524326181_omeustand_foto_7425d92912e3.webp'},
{b:'BMW',m:'218 i Cabrio Sport',p:19490,y:2016,km:108715,f:'Gasolina',img:'img/cars/omeustandcarros160626-1_875b9801f0b0.webp'},
{b:'Renault',m:'Mégane Sport Tourer',p:19490,y:2017,km:233602,f:'Gasóleo',img:'img/cars/5524324405_omeustand_foto_3602e48c7507.webp'},
{b:'Mercedes-Benz',m:'CLA 180 d Style Plus',p:15790,y:2020,km:166689,f:'Gasóleo',img:'img/cars/omeustandcarros162677-1_d7d640cc1523.webp'},
{b:'Mercedes-Benz',m:'A 180 CDI Edition',p:13990,y:2014,km:259250,f:'Gasóleo',img:'img/cars/omeustandcarros161778-1_1a008478c229.webp'},
{b:'Renault',m:'Mégane ST Intens',p:13990,y:2020,km:137993,f:'Gasóleo',img:'img/cars/omeustandcarros160173-1_952699f4a7a6.webp'},
{b:'Mercedes-Benz',m:'CLA 200 d AMG Line',p:12990,y:2015,km:142879,f:'Gasóleo',img:'img/cars/omeustandcarros163543-1_d26cd2f8844a.webp'},
{b:'Peugeot',m:'208 Active Pack',p:12990,y:2021,km:40566,f:'Gasóleo',img:'img/cars/omeustandcarros162556-1_5ada12c801c1.webp'},
{b:'Mercedes-Benz',m:'SLK 200 K',p:12990,y:2006,km:217153,f:'Gasolina',img:'img/cars/omeustandcarros161776-1_39f6f8fa8d46.webp'},
];

var PAGE=12,shown=0,filtered=[];
var grid=document.getElementById('grid'),countEl=document.getElementById('count-num'),moreWrap=document.getElementById('more-wrap'),emptyEl=document.getElementById('empty'),sortEl=document.getElementById('sort');
var fM=document.getElementById('f-marca'),fF=document.getElementById('f-fuel'),fP=document.getElementById('f-price'),fK=document.getElementById('f-km'),fY=document.getElementById('f-year'),tagsEl=document.getElementById('tags');

// Populate brands
[...new Set(CARS.map(c=>c.b))].sort().forEach(function(b){var o=document.createElement('option');o.value=b;o.textContent=b;fM.appendChild(o);});

// URL params
var params=new URLSearchParams(location.search);
if(params.get('marca'))fM.value=params.get('marca');
if(params.get('combustivel'))fF.value=params.get('combustivel');
if(params.get('preco_ate'))fP.value=params.get('preco_ate');
if(params.get('km_ate'))fK.value=params.get('km_ate');
if(params.get('ano_desde'))fY.value=params.get('ano_desde');

function cardHTML(c){
  var ps=c.p.toLocaleString('pt-PT')+'€';
  var ks=c.km.toLocaleString('pt-PT')+' km';
  var link=getLink(c);
  return '<a href="'+link+'" class="v-card bg-card rounded-sm overflow-hidden border border-border group block transition-all duration-500 hover:border-white/15">'+
    '<div class="relative aspect-[4/3] overflow-hidden">'+
      '<img src="'+c.img+'" alt="'+c.b+' '+c.m+'" class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-105 transition-all duration-700" loading="lazy"/>'+
      '<span class="absolute top-3 left-3 bg-black/50 backdrop-blur-sm px-2.5 py-1 text-[10px] font-medium tracking-wider uppercase rounded-sm">'+c.b+'</span>'+
    '</div>'+
    '<div class="p-5">'+
      '<h3 class="heading-md text-white mb-1 group-hover:text-muted transition-colors truncate">'+c.m+'</h3>'+
      '<div class="flex items-center gap-4 text-xs text-muted mt-2 mb-3"><span>'+c.y+'</span><span class="w-px h-3 bg-border"></span><span>'+ks+'</span><span class="w-px h-3 bg-border"></span><span>'+c.f+'</span></div>'+
      '<div class="divider mb-3"></div>'+
      '<p class="heading-md text-white">'+ps+'</p>'+
    '</div></a>';
}

function getFiltered(){
  var marca=fM.value,fuel=fF.value,maxP=fP.value?+fP.value:0,maxK=fK.value?+fK.value:0,minY=fY.value?+fY.value:0;
  var r=CARS.filter(function(c){
    if(marca&&c.b!==marca)return false;
    if(fuel&&c.f!==fuel)return false;
    if(maxP&&c.p>maxP)return false;
    if(maxK&&c.km>maxK)return false;
    if(minY&&c.y<minY)return false;
    return true;
  });
  var s=sortEl.value;
  r.sort(function(a,b){
    if(s==='price-asc')return a.p-b.p;if(s==='price-desc')return b.p-a.p;
    if(s==='year-desc')return b.y-a.y;if(s==='km-asc')return a.km-b.km;
    return 0;
  });
  return r;
}

function showTags(){
  var t=[];
  if(fM.value)t.push({l:fM.value,f:'f-marca'});if(fF.value)t.push({l:fF.value,f:'f-fuel'});
  if(fP.value)t.push({l:'Até '+parseInt(fP.value).toLocaleString('pt-PT')+'€',f:'f-price'});
  if(fK.value)t.push({l:'Até '+parseInt(fK.value).toLocaleString('pt-PT')+' km',f:'f-km'});
  if(fY.value)t.push({l:'Desde '+fY.value,f:'f-year'});
  if(!t.length){tagsEl.classList.add('hidden');return;}
  tagsEl.classList.remove('hidden');
  tagsEl.innerHTML=t.map(function(x){return '<span class="inline-flex items-center gap-1 bg-card border border-border px-3 py-1 text-[10px] tracking-wide cursor-pointer hover:border-white/20 transition-colors rounded-sm" data-clear="'+x.f+'">'+x.l+' <iconify-icon icon="solar:close-circle-linear" class="text-xs text-muted pointer-events-none"></iconify-icon></span>';}).join('');
  tagsEl.querySelectorAll('[data-clear]').forEach(function(el){el.addEventListener('click',function(){document.getElementById(this.dataset.clear).value='';render();});});
}

function render(){
  filtered=getFiltered();shown=0;grid.innerHTML='';countEl.textContent=filtered.length;showTags();
  if(!filtered.length){emptyEl.classList.remove('hidden');moreWrap.classList.add('hidden');return;}
  emptyEl.classList.add('hidden');loadMore();
}

function loadMore(){
  var batch=filtered.slice(shown,shown+PAGE);
  batch.forEach(function(c,i){
    var div=document.createElement('div');div.innerHTML=cardHTML(c);var card=div.firstChild;
    grid.appendChild(card);
    gsap.fromTo(card,{opacity:0,y:20},{opacity:1,y:0,duration:.5,delay:i*.06,ease:'power3.out'});
  });
  shown+=batch.length;
  moreWrap.classList.toggle('hidden',shown>=filtered.length);
}

[fM,fF,fP,fK,fY].forEach(function(el){el.addEventListener('change',render);});
sortEl.addEventListener('change',render);
document.getElementById('clear').addEventListener('click',function(){fM.value='';fF.value='';fP.value='';fK.value='';fY.value='';render();});
document.getElementById('more').addEventListener('click',loadMore);
render();
</script>
