    if(marca&&c.b!==marca)return false;
    if(fuel&&c.f!==fuel)return false;
    if(maxPrice&&c.p>maxPrice)return false;
    if(maxKm&&c.km>maxKm)return false;
    if(minYear&&c.y<minYear)return false;
    return true;
  });

  var sort=sortEl.value;
  r.sort(function(a,b){
    if(sort==='price-asc')return a.p-b.p;
    if(sort==='price-desc')return b.p-a.p;
    if(sort==='year-desc')return b.y-a.y;
    if(sort==='year-asc')return a.y-b.y;
    if(sort==='km-asc')return a.km-b.km;
    if(sort==='km-desc')return b.km-a.km;
    return 0;
  });
  return r;
}

function showActiveFilters(){
  var tags=[];
  if(fMarca.value)tags.push({label:fMarca.value,field:'f-marca'});
  if(fFuel.value)tags.push({label:fFuel.value,field:'f-fuel'});
  if(fPrice.value)tags.push({label:'Até '+parseInt(fPrice.value).toLocaleString('pt-PT')+'€',field:'f-price'});
  if(fKm.value)tags.push({label:'Até '+parseInt(fKm.value).toLocaleString('pt-PT')+' km',field:'f-km'});
  if(fYear.value)tags.push({label:'Desde '+fYear.value,field:'f-year'});

  if(tags.length===0){activeFiltersEl.classList.add('hidden');return;}
  activeFiltersEl.classList.remove('hidden');
  activeFiltersEl.innerHTML=tags.map(function(t){
    return '<span class="inline-flex items-center gap-1.5 glass px-3 py-1 rounded-full text-[10px] font-medium tracking-wide cursor-pointer hover:bg-white/10 transition-colors" data-clear="'+t.field+'">'+t.label+'<iconify-icon icon="solar:close-circle-linear" class="text-xs text-muted"></iconify-icon></span>';
  }).join('');
  activeFiltersEl.querySelectorAll('[data-clear]').forEach(function(el){
    el.addEventListener('click',function(){document.getElementById(this.dataset.clear).value='';render();});
  });
}

function render(){
  filtered=getFiltered();
  shown=0;
  grid.innerHTML='';
  countEl.textContent=filtered.length;
  showActiveFilters();
  if(filtered.length===0){emptyEl.classList.remove('hidden');loadWrap.classList.add('hidden');return;}
  emptyEl.classList.add('hidden');
  loadMore();
}

function loadMore(){
  var batch=filtered.slice(shown,shown+PAGE_SIZE);
  batch.forEach(function(c,i){
    var div=document.createElement('div');
    div.innerHTML=cardHTML(c);
    var card=div.firstChild;
    grid.appendChild(card);
    gsap.fromTo(card,{opacity:0,y:30,filter:'blur(4px)'},{opacity:1,y:0,filter:'blur(0px)',duration:0.5,delay:i*0.06,ease:'power3.out'});
  });
  shown+=batch.length;
  if(shown<filtered.length){loadWrap.classList.remove('hidden');}else{loadWrap.classList.add('hidden');}
}

// EVENTS
document.getElementById('apply-filters').addEventListener('click',render);
document.getElementById('clear-filters').addEventListener('click',function(){fMarca.value='';fFuel.value='';fPrice.value='';fKm.value='';fYear.value='';render();});
document.getElementById('load-more').addEventListener('click',loadMore);
sortEl.addEventListener('change',render);
[fMarca,fFuel,fPrice,fKm,fYear].forEach(function(el){el.addEventListener('change',render);});

// NAV BG
window.addEventListener('scroll',function(){var n=document.getElementById('main-nav');n.style.background=window.scrollY>50?'rgba(8,8,5,0.9)':'transparent';n.style.backdropFilter=window.scrollY>50?'blur(20px)':'none';});

// INIT
render();
</script>
</body>
</html>
