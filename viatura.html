gsap.utils.toArray('.reveal').forEach(function(el){gsap.fromTo(el,{opacity:0,y:30},{opacity:1,y:0,duration:1,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 88%',toggleActions:'play none none none'}});});
</script>
